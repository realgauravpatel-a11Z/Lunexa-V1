<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>Order Confirmed — Lunexa</title><link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpolygon points='16,2 28,9 28,23 16,30 4,23 4,9' stroke='%234F46E5' stroke-width='2' fill='none'/%3E%3Cpath d='M11 10 L11 22 L21 22' stroke='%234F46E5' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"/><link rel="stylesheet" href="css/style.css"/></head>
<body><div class="page-wrap"><header id="navbar"></header><main>
<div class="success-page"><div class="success-card">
  <div class="success-icon-wrap"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
  <h1>Order Confirmed!</h1>
  <p>Thank you for your purchase. Your order is being prepared and will be delivered soon.</p>
  <div class="success-order-num"><div class="success-order-num-label">Order Number</div><div class="success-order-num-val" id="order-number">—</div></div>
  <div style="display:flex;gap:24px;margin-bottom:28px;justify-content:center;flex-wrap:wrap;">
    <div style="text-align:center;"><div style="font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-2);margin-bottom:4px;">Estimated Delivery</div><div style="font-size:15px;font-weight:700;color:var(--text);" id="delivery-date">—</div></div>
    <div style="text-align:center;"><div style="font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-2);margin-bottom:4px;">Shipping</div><div style="font-size:15px;font-weight:700;color:var(--text);">Standard Free</div></div>
  </div>
  <div class="success-actions">
    <a href="#" id="track-btn" class="btn-success-primary"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Track My Order</a>
    <a href="products.html" class="btn-success-primary" style="background:var(--dark);"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>Continue Shopping</a>
    <a href="index.html" class="btn-success-secondary">Return to Home</a>
  </div>
</div></div>
</main><footer class="footer"><div class="container"><div class="footer-bottom" style="padding:20px 0;border-top:1px solid rgba(255,255,255,.07);"><span style="color:rgba(255,255,255,.35)">&copy; 2025 Lunexa.</span></div></div></footer>
</div>
<script src="js/storage.js"></script><script src="js/data.js"></script><script src="js/cart.js"></script><script src="js/wishlist.js"></script><script src="js/cookie.js"></script><script src="js/navbar.js"></script>
<script>
document.addEventListener('DOMContentLoaded',()=>{
  const p=new URLSearchParams(window.location.search);
  const orderId=p.get('order')||('ORD-'+Date.now().toString(36).toUpperCase());
  const trackingId=p.get('tracking')||('TRK'+Math.random().toString(36).slice(2,10).toUpperCase());
  const g=id=>document.getElementById(id);
  if(g('order-number'))g('order-number').textContent=orderId;
  const d=new Date();d.setDate(d.getDate()+6);
  if(g('delivery-date'))g('delivery-date').textContent=d.toLocaleDateString('en-IN',{weekday:'short',month:'long',day:'numeric'});
  if(g('track-btn'))g('track-btn').href=`tracking.html?order=${orderId}&tracking=${trackingId}`;
  spawnConfetti();
});
function spawnConfetti(){
  const colors=['#4F46E5','#6366F1','#0EA5E9','#0F172A','#E0F2FE'];
  for(let i=0;i<40;i++){
    const el=document.createElement('div');const s=Math.random()*9+5;
    el.style.cssText=`position:fixed;pointer-events:none;z-index:9999;border-radius:${Math.random()>.5?'50%':'3px'};width:${s}px;height:${s}px;background:${colors[Math.floor(Math.random()*colors.length)]};left:${Math.random()*100}vw;top:-20px;opacity:${Math.random()*.7+.3};animation:confettiFall ${Math.random()*2+1.5}s ease-in ${Math.random()*.8}s forwards`;
    document.body.appendChild(el);setTimeout(()=>el.remove(),4500);
  }
}
</script>
<style>@keyframes confettiFall{0%{transform:translateY(0) rotate(0deg) translateX(0);opacity:.9}50%{transform:translateY(50vh) rotate(200deg) translateX(30px)}100%{transform:translateY(110vh) rotate(400deg) translateX(-20px);opacity:0}}</style>
</body></html>
