<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>Admin — Lunexa</title><link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpolygon points='16,2 28,9 28,23 16,30 4,23 4,9' stroke='%234F46E5' stroke-width='2' fill='none'/%3E%3Cpath d='M11 10 L11 22 L21 22' stroke='%234F46E5' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"/><link rel="stylesheet" href="css/style.css"/><link rel="stylesheet" href="css/auth.css"/></head>
<body><div class="page-wrap"><header id="navbar"></header><main id="admin-main"></main></div>
<script src="js/storage.js"></script><script src="js/data.js"></script><script src="js/cart.js"></script><script src="js/wishlist.js"></script><script src="js/cookie.js"></script><script src="js/navbar.js"></script>
<script>
const PASS='lunexa2025';
document.addEventListener('DOMContentLoaded',()=>{Store.getAdminSession()?renderAdmin():renderLock();});
function renderLock(){
  document.getElementById('admin-main').innerHTML=`<div class="admin-lock-screen"><div class="admin-lock-box"><div class="admin-lock-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div><h2>Admin Access</h2><p>Enter the passkey to access the control panel.</p><div id="lock-err" class="auth-error" style="display:none;margin-bottom:12px;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>Incorrect passkey.</div><div style="display:flex;gap:8px;"><input type="password" id="pk-input" placeholder="Enter passkey…" style="flex:1;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--r-md);font-family:var(--font-body);font-size:14px;color:var(--text);outline:none;" onfocus="this.style.borderColor='var(--primary)'" onblur="this.style.borderColor='var(--border)'" onkeydown="if(event.key==='Enter')unlock()"/><button onclick="unlock()" class="btn btn-primary">Unlock</button></div><p style="margin-top:14px;font-size:12px;color:var(--muted-2);">Demo passkey: <strong style="color:var(--text);font-family:monospace;">${PASS}</strong></p></div></div>`;
}
function unlock(){const val=document.getElementById('pk-input')?.value;if(val===PASS){Store.setAdminSession(true);renderAdmin();}else{document.getElementById('lock-err').style.display='flex';document.getElementById('pk-input').style.borderColor='var(--error)';}}
function renderAdmin(){
  const products=getActiveProducts(),users=Store.getUsers();
  const totalOrders=users.reduce((s,u)=>s+Store.getOrders(u.id).length,0);
  document.getElementById('admin-main').innerHTML=`<div class="container"><nav class="breadcrumb"><a href="index.html">Home</a><span class="breadcrumb-sep">›</span><span>Admin</span></nav>
  <div class="admin-layout">
    <div class="admin-sidebar"><div class="admin-sidebar-header"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.7)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg><span class="admin-sidebar-title">ADMIN</span></div>
    <nav class="admin-nav">
      <button class="admin-nav-item active" id="at-dashboard" onclick="switchA('dashboard')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</button>
      <button class="admin-nav-item" id="at-products" onclick="switchA('products')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>Products</button>
      <button class="admin-nav-item" id="at-add" onclick="switchA('add')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add Product</button>
      <button class="admin-nav-item" id="at-users" onclick="switchA('users')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Users</button>
      <div style="height:1px;background:var(--border);margin:8px 0;"></div>
      <button class="admin-nav-item" onclick="Store.clearAdminSession();renderLock();" style="color:var(--error);"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>Lock Panel</button>
    </nav></div>
    <div class="admin-content">
      <div class="admin-panel active" id="ap-dashboard"><div class="admin-panel-header"><h2 class="admin-panel-title">Dashboard</h2></div>
        <div class="admin-stats-grid">
          <div class="admin-stat-card"><div class="admin-stat-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg></div><div class="admin-stat-val">${products.length}</div><div class="admin-stat-label">Total Products</div></div>
          <div class="admin-stat-card"><div class="admin-stat-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div><div class="admin-stat-val">${users.length}</div><div class="admin-stat-label">Registered Users</div></div>
          <div class="admin-stat-card"><div class="admin-stat-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg></div><div class="admin-stat-val">${totalOrders}</div><div class="admin-stat-label">Total Orders</div></div>
        </div>
        <div class="admin-form-box"><h3>Category Breakdown</h3>${['electronics','gadgets','accessories'].map(cat=>{const cnt=products.filter(p=>p.category===cat).length,pct=Math.round(cnt/products.length*100);return `<div style="margin-bottom:14px;"><div style="display:flex;justify-content:space-between;font-size:13.5px;margin-bottom:5px;"><span style="text-transform:capitalize;font-weight:500;">${cat}</span><span style="color:var(--muted-2);">${cnt} products</span></div><div style="height:6px;background:var(--bg);border-radius:var(--r-pill);overflow:hidden;"><div style="width:${pct}%;height:100%;background:linear-gradient(90deg,var(--primary),#6366F1);border-radius:var(--r-pill);"></div></div></div>`;}).join('')}</div>
      </div>
      <div class="admin-panel" id="ap-products"><div class="admin-panel-header"><h2 class="admin-panel-title">Products</h2><button class="btn btn-primary btn-sm" onclick="switchA('add')">+ Add Product</button></div><div id="products-table-wrap"></div></div>
      <div class="admin-panel" id="ap-add"><div class="admin-panel-header"><h2 class="admin-panel-title" id="add-heading">Add Product</h2></div>
        <div class="admin-form-box"><form id="product-form">
          <input type="hidden" id="edit-id"/>
          <div class="form-row"><div class="form-group"><label>Name *</label><input type="text" id="p-name" placeholder="Product name" required/><span class="field-error"></span></div><div class="form-group"><label>Category *</label><select id="p-cat" required><option value="">Select…</option><option value="electronics">Electronics</option><option value="gadgets">Gadgets</option><option value="accessories">Accessories</option></select><span class="field-error"></span></div></div>
          <div class="form-row"><div class="form-group"><label>Sale Price (₹) *</label><input type="number" id="p-price" placeholder="29999" required min="1"/><span class="field-error"></span></div><div class="form-group"><label>Original Price (₹) *</label><input type="number" id="p-old" placeholder="39999" required min="1"/><span class="field-error"></span></div></div>
          <div class="form-row"><div class="form-group"><label>Rating</label><input type="number" id="p-rating" placeholder="4.5" min="0" max="5" step="0.1" value="4.5"/></div><div class="form-group"><label>Reviews Count</label><input type="number" id="p-reviews" placeholder="1200" min="0" value="0"/></div></div>
          <div class="form-group"><label>Image URL</label><input type="url" id="p-image" placeholder="https://images.unsplash.com/…"/></div>
          <div class="form-group"><label>Description *</label><textarea id="p-desc" rows="3" placeholder="Describe the product…" required style="width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--r-md);font-family:var(--font-body);font-size:14px;resize:vertical;outline:none;" onfocus="this.style.borderColor='var(--primary)'" onblur="this.style.borderColor='var(--border)'"></textarea><span class="field-error"></span></div>
          <div class="form-group"><label>Specs (one per line)</label><textarea id="p-specs" rows="4" placeholder="64MP Camera&#10;5G&#10;256GB" style="width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--r-md);font-family:var(--font-body);font-size:14px;resize:vertical;outline:none;" onfocus="this.style.borderColor='var(--primary)'" onblur="this.style.borderColor='var(--border)'"></textarea></div>
          <div id="pform-msg" style="display:none;margin-bottom:12px;"></div>
          <div style="display:flex;gap:10px;"><button type="submit" class="btn btn-primary" id="pform-btn">Save Product</button><button type="button" class="btn btn-outline" onclick="resetForm()">Reset</button></div>
        </form></div>
      </div>
      <div class="admin-panel" id="ap-users"><div class="admin-panel-header"><h2 class="admin-panel-title">Users</h2></div><div id="users-table-wrap"></div></div>
    </div>
  </div></div>`;
  renderProductsTable();renderUsersTable();bindProductForm();
}
function renderProductsTable(){
  const w=document.getElementById('products-table-wrap');if(!w)return;
  const ps=getActiveProducts();
  w.innerHTML=`<div style="overflow-x:auto;"><table class="admin-products-table"><thead><tr><th>Image</th><th>Name</th><th>Category</th><th>Price</th><th>Rating</th><th>Actions</th></tr></thead><tbody>${ps.map(p=>`<tr><td><img class="admin-product-img" src="${p.image}" onerror="this.src='https://picsum.photos/seed/ln${p.id}/80/80'" alt="${p.name}"/></td><td style="max-width:180px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.name}</td><td style="text-transform:capitalize;color:var(--muted);">${p.category}</td><td style="font-weight:700;">${formatPrice(p.price)}</td><td>${p.rating}</td><td><div class="admin-action-btns"><button class="admin-btn-edit" onclick="editProduct(${p.id})">Edit</button><button class="admin-btn-delete" onclick="deleteProduct(${p.id})">Delete</button></div></td></tr>`).join('')}</tbody></table></div>`;
}
function renderUsersTable(){
  const w=document.getElementById('users-table-wrap');if(!w)return;
  const users=Store.getUsers();
  if(!users.length){w.innerHTML='<div style="text-align:center;padding:48px;color:var(--muted);">No registered users yet.</div>';return;}
  w.innerHTML=`<div style="overflow-x:auto;"><table class="admin-products-table"><thead><tr><th>Name</th><th>Email</th><th>Joined</th><th>Orders</th></tr></thead><tbody>${users.map(u=>`<tr><td><div style="display:flex;align-items:center;gap:10px;"><div style="width:32px;height:32px;border-radius:50%;background:var(--primary-light);color:var(--primary);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;">${u.avatar||u.name.charAt(0)}</div><span style="font-weight:500;">${u.name}</span></div></td><td style="color:var(--muted);">${u.email}</td><td style="color:var(--muted-2);">${new Date(u.createdAt).toLocaleDateString('en-IN',{month:'short',day:'numeric',year:'numeric'})}</td><td>${Store.getOrders(u.id).length}</td></tr>`).join('')}</tbody></table></div>`;
}
function bindProductForm(){
  const form=document.getElementById('product-form');if(!form)return;
  form.addEventListener('submit',e=>{
    e.preventDefault();const n=document.getElementById('p-name').value.trim(),cat=document.getElementById('p-cat').value,price=parseFloat(document.getElementById('p-price').value),old=parseFloat(document.getElementById('p-old').value),desc=document.getElementById('p-desc').value.trim();
    if(!n||!cat||!price||!old||!desc){showPMsg('Please fill all required fields.','error');return;}
    const editId=document.getElementById('edit-id').value;const specs=(document.getElementById('p-specs').value||'').split('\n').map(s=>s.trim()).filter(Boolean);
    const ps=[...getActiveProducts()];
    if(editId){const idx=ps.findIndex(p=>p.id===parseInt(editId));if(idx!==-1)ps[idx]={...ps[idx],name:n,category:cat,price,oldPrice:old,description:desc,specs,rating:parseFloat(document.getElementById('p-rating').value)||4.5,reviews:parseInt(document.getElementById('p-reviews').value)||0,image:document.getElementById('p-image').value||ps[idx].image};showPMsg('Product updated!','success');}
    else{const newId=Math.max(...ps.map(p=>p.id))+1;ps.push({id:newId,name:n,category:cat,price,oldPrice:old,description:desc,specs,rating:parseFloat(document.getElementById('p-rating').value)||4.5,reviews:parseInt(document.getElementById('p-reviews').value)||0,image:document.getElementById('p-image').value||`https://picsum.photos/seed/adm${newId}/600/600`});showPMsg('Product added!','success');}
    Store.setProductOverrides(ps);resetForm();renderProductsTable();
  });
}
function editProduct(id){const p=getProductById(id);if(!p)return;document.getElementById('edit-id').value=id;document.getElementById('p-name').value=p.name;document.getElementById('p-cat').value=p.category;document.getElementById('p-price').value=p.price;document.getElementById('p-old').value=p.oldPrice;document.getElementById('p-rating').value=p.rating;document.getElementById('p-reviews').value=p.reviews;document.getElementById('p-image').value=p.image;document.getElementById('p-desc').value=p.description;document.getElementById('p-specs').value=(p.specs||[]).join('\n');document.getElementById('add-heading').textContent='Edit Product';document.getElementById('pform-btn').textContent='Update Product';switchA('add');}
function deleteProduct(id){if(!confirm('Delete this product?'))return;Store.setProductOverrides(getActiveProducts().filter(p=>p.id!==id));renderProductsTable();Cart.showToast('Product deleted.');}
function resetForm(){document.getElementById('product-form')?.reset();document.getElementById('edit-id').value='';document.getElementById('add-heading').textContent='Add Product';document.getElementById('pform-btn').textContent='Save Product';document.getElementById('pform-msg').style.display='none';}
function showPMsg(msg,type){const el=document.getElementById('pform-msg');if(!el)return;el.innerHTML=type==='success'?`<div class="auth-success"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>${msg}</div>`:`<div class="auth-error">${msg}</div>`;el.style.display='block';setTimeout(()=>{el.style.display='none';},3500);}
function switchA(tab){document.querySelectorAll('.admin-panel').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.admin-nav-item').forEach(b=>b.classList.remove('active'));document.getElementById(`ap-${tab}`)?.classList.add('active');document.getElementById(`at-${tab}`)?.classList.add('active');}
</script></body></html>
