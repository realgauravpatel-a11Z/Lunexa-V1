<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel — Lunexa</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' stroke='%23C8A96E' stroke-width='2' fill='none'/%3E%3Cpath d='M10 22 L16 10 L22 22' stroke='%23C8A96E' stroke-width='2' fill='none'/%3E%3C/svg%3E"/>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/auth.css"/>
</head>
<body>
<div class="page-wrap">
  <header id="navbar"></header>
  <main id="admin-main">
    <!-- Rendered by JS -->
  </main>
</div>

<script src="js/data.js"></script>
<script src="js/storage.js"></script>
<script src="js/cart.js"></script>
<script src="js/wishlist.js"></script>
<script src="js/navbar.js"></script>
<script src="js/cookie.js"></script>
<script>
const ADMIN_PASSKEY = 'lunexa2025'; // Demo passkey

document.addEventListener('DOMContentLoaded', () => {
  if (Store.getAdminSession()) {
    renderAdminPanel();
  } else {
    renderLockScreen();
  }
});

// ── Lock screen ────────────────────────────────────────────
function renderLockScreen() {
  document.getElementById('admin-main').innerHTML = `
    <div class="admin-lock-screen">
      <div class="admin-lock-box">
        <div class="admin-lock-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <h2>Admin Access</h2>
        <p>Enter the admin passkey to access the control panel. This area is restricted.</p>
        <div id="lock-error" class="auth-error" style="display:none;margin-bottom:12px;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span id="lock-error-text"></span>
        </div>
        <div style="display:flex;gap:8px;">
          <input type="password" id="passkey-input" placeholder="Enter passkey…"
            style="flex:1;padding:11px 14px;border:1px solid var(--border);border-radius:var(--r-md);font-family:var(--font-body);font-size:14px;color:var(--obsidian);outline:none;"
            onfocus="this.style.borderColor='var(--obsidian)'" onblur="this.style.borderColor='var(--border)'"
            onkeydown="if(event.key==='Enter')unlockAdmin()"/>
          <button onclick="unlockAdmin()" class="btn btn-primary" style="padding:11px 18px;">
            Unlock
          </button>
        </div>
        <p style="margin-top:16px;font-size:12px;color:var(--slate-2);">Demo passkey: <strong style="color:var(--obsidian);font-family:monospace;">${ADMIN_PASSKEY}</strong></p>
      </div>
    </div>`;
}

function unlockAdmin() {
  const val = document.getElementById('passkey-input')?.value;
  if (val === ADMIN_PASSKEY) {
    Store.setAdminSession(true);
    renderAdminPanel();
  } else {
    const el = document.getElementById('lock-error');
    const tx = document.getElementById('lock-error-text');
    if (el && tx) { tx.textContent = 'Incorrect passkey. Please try again.'; el.style.display='flex'; }
    document.getElementById('passkey-input').style.borderColor = 'var(--error)';
  }
}

// ── Admin panel ────────────────────────────────────────────
function renderAdminPanel() {
  const products = getActiveProducts();
  const users    = Store.getUsers();
  const totalOrders = users.reduce((sum, u) => sum + Store.getOrders(u.id).length, 0);

  document.getElementById('admin-main').innerHTML = `
    <div class="container">
      <nav class="breadcrumb">
        <a href="index.html">Home</a>
        <span class="breadcrumb-sep">›</span>
        <span>Admin Panel</span>
      </nav>
      <div class="admin-layout">

        <!-- Sidebar -->
        <div class="admin-sidebar">
          <div class="admin-sidebar-header">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            <span class="admin-sidebar-title">ADMIN</span>
          </div>
          <nav class="admin-nav">
            <button class="admin-nav-item active" id="a-tab-btn-dashboard" onclick="switchAdminTab('dashboard')">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
              Dashboard
            </button>
            <button class="admin-nav-item" id="a-tab-btn-products" onclick="switchAdminTab('products')">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
              Products
            </button>
            <button class="admin-nav-item" id="a-tab-btn-add-product" onclick="switchAdminTab('add-product')">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Add Product
            </button>
            <button class="admin-nav-item" id="a-tab-btn-users" onclick="switchAdminTab('users')">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
              Users
            </button>
            <div style="height:1px;background:var(--border);margin:8px 0;"></div>
            <button class="admin-nav-item" onclick="lockAdmin()" style="color:var(--error);">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              Lock Panel
            </button>
          </nav>
        </div>

        <!-- Content -->
        <div class="admin-content">

          <!-- Dashboard -->
          <div class="admin-panel active" id="a-panel-dashboard">
            <div class="admin-panel-header">
              <h2 class="admin-panel-title">Dashboard</h2>
            </div>
            <div class="admin-stats-grid">
              <div class="admin-stat-card">
                <div class="admin-stat-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg></div>
                <div class="admin-stat-val">${products.length}</div>
                <div class="admin-stat-label">Total Products</div>
              </div>
              <div class="admin-stat-card">
                <div class="admin-stat-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div>
                <div class="admin-stat-val">${users.length}</div>
                <div class="admin-stat-label">Registered Users</div>
              </div>
              <div class="admin-stat-card">
                <div class="admin-stat-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
                <div class="admin-stat-val">${totalOrders}</div>
                <div class="admin-stat-label">Total Orders</div>
              </div>
            </div>
            <div class="admin-form-box">
              <h3>Product Categories</h3>
              <div style="display:flex;flex-direction:column;gap:10px;margin-top:4px;">
                ${['electronics','gadgets','accessories'].map(cat => {
                  const count = products.filter(p=>p.category===cat).length;
                  const pct   = Math.round(count/products.length*100);
                  return `<div>
                    <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;">
                      <span style="text-transform:capitalize;font-weight:500;">${cat}</span>
                      <span style="color:var(--slate-2);">${count} products</span>
                    </div>
                    <div style="height:6px;background:var(--cream-2);border-radius:var(--r-pill);overflow:hidden;">
                      <div style="width:${pct}%;height:100%;background:var(--gold);border-radius:var(--r-pill);"></div>
                    </div>
                  </div>`;
                }).join('')}
              </div>
            </div>
          </div>

          <!-- Products list -->
          <div class="admin-panel" id="a-panel-products">
            <div class="admin-panel-header">
              <h2 class="admin-panel-title">Products</h2>
              <button class="btn btn-primary btn-sm" onclick="switchAdminTab('add-product')">+ Add Product</button>
            </div>
            <div id="admin-products-table-wrap"></div>
          </div>

          <!-- Add product -->
          <div class="admin-panel" id="a-panel-add-product">
            <div class="admin-panel-header">
              <h2 class="admin-panel-title" id="add-product-heading">Add Product</h2>
            </div>
            <div class="admin-form-box">
              <form id="product-form">
                <input type="hidden" id="edit-product-id"/>
                <div class="form-row">
                  <div class="form-group">
                    <label for="p-name">Product Name *</label>
                    <input type="text" id="p-name" placeholder="e.g. UltraBook Pro 14" required/>
                    <span class="field-error"></span>
                  </div>
                  <div class="form-group">
                    <label for="p-category">Category *</label>
                    <select id="p-category" required>
                      <option value="">Select…</option>
                      <option value="electronics">Electronics</option>
                      <option value="gadgets">Gadgets</option>
                      <option value="accessories">Accessories</option>
                    </select>
                    <span class="field-error"></span>
                  </div>
                </div>
                <div class="form-row">
                  <div class="form-group">
                    <label for="p-price">Sale Price ($) *</label>
                    <input type="number" id="p-price" placeholder="299" required min="1"/>
                    <span class="field-error"></span>
                  </div>
                  <div class="form-group">
                    <label for="p-old-price">Original Price ($) *</label>
                    <input type="number" id="p-old-price" placeholder="399" required min="1"/>
                    <span class="field-error"></span>
                  </div>
                </div>
                <div class="form-row">
                  <div class="form-group">
                    <label for="p-rating">Rating (0–5)</label>
                    <input type="number" id="p-rating" placeholder="4.5" min="0" max="5" step="0.1" value="4.5"/>
                  </div>
                  <div class="form-group">
                    <label for="p-reviews">Review Count</label>
                    <input type="number" id="p-reviews" placeholder="1200" min="0" value="0"/>
                  </div>
                </div>
                <div class="form-group">
                  <label for="p-image">Image URL</label>
                  <input type="url" id="p-image" placeholder="https://images.unsplash.com/…"/>
                </div>
                <div class="form-group">
                  <label for="p-desc">Description *</label>
                  <textarea id="p-desc" rows="3" placeholder="Describe the product…" required
                    style="width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:var(--r-md);font-family:var(--font-body);font-size:14px;resize:vertical;outline:none;"
                    onfocus="this.style.borderColor='var(--obsidian)'" onblur="this.style.borderColor='var(--border)'"></textarea>
                  <span class="field-error"></span>
                </div>
                <div class="form-group">
                  <label for="p-specs">Specs (one per line)</label>
                  <textarea id="p-specs" rows="4" placeholder="64MP Camera&#10;5G Connectivity&#10;256GB Storage&#10;All-day battery"
                    style="width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:var(--r-md);font-family:var(--font-body);font-size:14px;resize:vertical;outline:none;"
                    onfocus="this.style.borderColor='var(--obsidian)'" onblur="this.style.borderColor='var(--border)'"></textarea>
                </div>
                <div id="pform-msg" style="display:none;margin-bottom:12px;"></div>
                <div style="display:flex;gap:10px;">
                  <button type="submit" class="btn btn-primary" id="pform-submit-btn">Save Product</button>
                  <button type="button" class="btn btn-outline" onclick="resetProductForm()">Reset</button>
                </div>
              </form>
            </div>
          </div>

          <!-- Users -->
          <div class="admin-panel" id="a-panel-users">
            <div class="admin-panel-header">
              <h2 class="admin-panel-title">Users</h2>
            </div>
            <div id="admin-users-wrap"></div>
          </div>

        </div>
      </div>
    </div>`;

  renderProductsTable();
  renderUsersTable();
  bindProductForm();
}

function renderProductsTable() {
  const wrap = document.getElementById('admin-products-table-wrap');
  if (!wrap) return;
  const products = getActiveProducts();
  wrap.innerHTML = `
    <div style="overflow-x:auto;">
      <table class="admin-products-table">
        <thead>
          <tr>
            <th>Image</th>
            <th>Name</th>
            <th>Category</th>
            <th>Price</th>
            <th>Rating</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          ${products.map(p => `
            <tr>
              <td><img class="admin-product-img" src="${p.image}" alt="${p.name}" onerror="this.src='https://picsum.photos/seed/fb${p.id}/80/80'"/></td>
              <td style="max-width:200px;"><div style="font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.name}</div></td>
              <td style="text-transform:capitalize;color:var(--slate);">${p.category}</td>
              <td style="font-weight:600;">${formatPrice(p.price)}</td>
              <td>${p.rating}</td>
              <td>
                <div class="admin-action-btns">
                  <button class="admin-btn-edit" onclick="editProduct(${p.id})">Edit</button>
                  <button class="admin-btn-delete" onclick="deleteProduct(${p.id})">Delete</button>
                </div>
              </td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

function renderUsersTable() {
  const wrap = document.getElementById('admin-users-wrap');
  if (!wrap) return;
  const users = Store.getUsers();
  if (users.length === 0) {
    wrap.innerHTML = '<div style="text-align:center;padding:48px;color:var(--slate);">No registered users yet.</div>';
    return;
  }
  wrap.innerHTML = `
    <div style="overflow-x:auto;">
      <table class="admin-products-table">
        <thead><tr><th>Name</th><th>Email</th><th>Joined</th><th>Orders</th></tr></thead>
        <tbody>
          ${users.map(u => `
            <tr>
              <td><div style="display:flex;align-items:center;gap:10px;">
                <div style="width:32px;height:32px;border-radius:50%;background:var(--gold-pale);color:var(--obsidian);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;">${u.avatar||u.name.charAt(0)}</div>
                <span style="font-weight:500;">${u.name}</span>
              </div></td>
              <td style="color:var(--slate);">${u.email}</td>
              <td style="color:var(--slate-2);">${new Date(u.createdAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</td>
              <td>${Store.getOrders(u.id).length}</td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

function bindProductForm() {
  const form = document.getElementById('product-form');
  if (!form) return;
  form.addEventListener('submit', e => {
    e.preventDefault();
    const name     = document.getElementById('p-name').value.trim();
    const category = document.getElementById('p-category').value;
    const price    = parseFloat(document.getElementById('p-price').value);
    const oldPrice = parseFloat(document.getElementById('p-old-price').value);
    const desc     = document.getElementById('p-desc').value.trim();
    if (!name||!category||!price||!oldPrice||!desc) {
      showFormMsg('Please fill all required fields.', 'error'); return;
    }
    const editId = document.getElementById('edit-product-id').value;
    const specs  = (document.getElementById('p-specs').value || '').split('\n').map(s=>s.trim()).filter(Boolean);
    const products = [...getActiveProducts()];

    if (editId) {
      const idx = products.findIndex(p => p.id === parseInt(editId));
      if (idx !== -1) {
        products[idx] = { ...products[idx], name, category, price, oldPrice, description:desc, specs,
          rating: parseFloat(document.getElementById('p-rating').value)||4.5,
          reviews: parseInt(document.getElementById('p-reviews').value)||0,
          image: document.getElementById('p-image').value || products[idx].image };
      }
      showFormMsg('Product updated successfully!', 'success');
    } else {
      const newId = Math.max(...products.map(p=>p.id)) + 1;
      products.push({ id:newId, name, category, price, oldPrice, description:desc, specs,
        rating: parseFloat(document.getElementById('p-rating').value)||4.5,
        reviews: parseInt(document.getElementById('p-reviews').value)||0,
        image: document.getElementById('p-image').value || `https://picsum.photos/seed/admin${newId}/600/600` });
      showFormMsg('Product added successfully!', 'success');
    }
    Store.setProductOverrides(products);
    resetProductForm();
    renderProductsTable();
  });
}

function editProduct(id) {
  const p = getProductById(id);
  if (!p) return;
  document.getElementById('edit-product-id').value = id;
  document.getElementById('p-name').value     = p.name;
  document.getElementById('p-category').value = p.category;
  document.getElementById('p-price').value    = p.price;
  document.getElementById('p-old-price').value= p.oldPrice;
  document.getElementById('p-rating').value   = p.rating;
  document.getElementById('p-reviews').value  = p.reviews;
  document.getElementById('p-image').value    = p.image;
  document.getElementById('p-desc').value     = p.description;
  document.getElementById('p-specs').value    = (p.specs||[]).join('\n');
  document.getElementById('add-product-heading').textContent = 'Edit Product';
  document.getElementById('pform-submit-btn').textContent = 'Update Product';
  switchAdminTab('add-product');
}

function deleteProduct(id) {
  if (!confirm('Delete this product? This cannot be undone.')) return;
  const products = getActiveProducts().filter(p => p.id !== id);
  Store.setProductOverrides(products);
  renderProductsTable();
  Cart.showToast('Product deleted.');
}

function resetProductForm() {
  document.getElementById('product-form')?.reset();
  document.getElementById('edit-product-id').value = '';
  document.getElementById('add-product-heading').textContent = 'Add Product';
  document.getElementById('pform-submit-btn').textContent = 'Save Product';
  document.getElementById('pform-msg').style.display = 'none';
}

function showFormMsg(msg, type) {
  const el = document.getElementById('pform-msg');
  if (!el) return;
  el.innerHTML = type === 'success'
    ? `<div class="auth-success"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>${msg}</div>`
    : `<div class="auth-error"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>${msg}</div>`;
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 3500);
}

function switchAdminTab(tab) {
  document.querySelectorAll('.admin-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.admin-nav-item').forEach(b => b.classList.remove('active'));
  document.getElementById(`a-panel-${tab}`)?.classList.add('active');
  document.getElementById(`a-tab-btn-${tab}`)?.classList.add('active');
}

function lockAdmin() {
  Store.clearAdminSession();
  renderLockScreen();
}

function formatPrice(p) { return '$' + p.toLocaleString('en-US', {minimumFractionDigits:0}); }
</script>
</body>
</html>
