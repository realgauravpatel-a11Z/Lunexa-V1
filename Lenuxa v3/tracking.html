<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Track Order — Lunexa</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' stroke='%23C8A96E' stroke-width='2' fill='none'/%3E%3Cpath d='M10 22 L16 10 L22 22' stroke='%23C8A96E' stroke-width='2' fill='none'/%3E%3C/svg%3E"/>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/auth.css"/>
</head>
<body>
<div class="page-wrap">
  <header id="navbar"></header>
  <main>
    <div class="container">
      <nav class="breadcrumb">
        <a href="index.html">Home</a>
        <span class="breadcrumb-sep">›</span>
        <a href="profile.html#orders">Orders</a>
        <span class="breadcrumb-sep">›</span>
        <span>Track Order</span>
      </nav>
      <div id="tracking-content"></div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom" style="padding:20px 0;border-top:1px solid rgba(255,255,255,0.07);">
        <span style="color:rgba(255,255,255,0.35)">&copy; 2025 Lunexa. All rights reserved.</span>
        <div class="footer-bottom-links"><a href="privacy.html">Privacy</a><a href="contact.html">Support</a></div>
      </div>
    </div>
  </footer>
</div>

<script src="js/data.js"></script>
<script src="js/storage.js"></script>
<script src="js/cart.js"></script>
<script src="js/wishlist.js"></script>
<script src="js/navbar.js"></script>
<script src="js/cookie.js"></script>
<script>
const STEPS = [
  {
    key: 'placed',
    label: 'Order Placed',
    desc: 'Your order has been received and confirmed.',
    icon: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>`
  },
  {
    key: 'packed',
    label: 'Packed',
    desc: 'Your items have been carefully packed and are ready for collection.',
    icon: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>`
  },
  {
    key: 'shipped',
    label: 'Shipped',
    desc: 'Your order is on its way with our delivery partner.',
    icon: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>`
  },
  {
    key: 'out-for-delivery',
    label: 'Out for Delivery',
    desc: 'Your package is with the delivery courier and will arrive today.',
    icon: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`
  },
  {
    key: 'delivered',
    label: 'Delivered',
    desc: 'Your order has been delivered successfully.',
    icon: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`
  }
];

document.addEventListener('DOMContentLoaded', () => {
  const params    = new URLSearchParams(window.location.search);
  const orderId   = params.get('order');
  const trackingId = params.get('tracking');
  const container = document.getElementById('tracking-content');

  // Find order from all users (demo: search current user first, then all)
  let order = null;
  const user = Store.getCurrentUser();
  if (user) {
    order = Store.getOrders(user.id).find(o => o.id === orderId);
  }

  if (!order && orderId) {
    // Try to show a simulated order based on URL params
    order = generateSimulatedOrder(orderId, trackingId);
  }

  if (!order) {
    container.innerHTML = `
      <div style="text-align:center;padding:80px 0;">
        <h2 style="font-family:var(--font-display);font-size:28px;margin-bottom:12px;">Order Not Found</h2>
        <p style="color:var(--slate);margin-bottom:24px;">We could not find this order. Please check your profile for your order history.</p>
        <a href="profile.html#orders" class="btn btn-primary btn-pill">View My Orders</a>
      </div>`;
    return;
  }

  renderTracking(order, container);
});

function generateSimulatedOrder(id, trackingId) {
  return {
    id: id || 'ORD-UNKNOWN',
    trackingId: trackingId || 'TRK000000',
    date: new Date(Date.now() - 2 * 86400000).toISOString(),
    status: 'shipped',
    estimatedDelivery: new Date(Date.now() + 4 * 86400000).toISOString(),
    items: [],
    total: 0,
    paymentMethod: 'card',
  };
}

function renderTracking(order, container) {
  const currentStepIdx = STEPS.findIndex(s => s.key === order.status);
  const estDate = new Date(order.estimatedDelivery || Date.now() + 5*86400000)
    .toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });

  container.innerHTML = `
    <div class="tracking-card">
      <div class="tracking-header">
        <div class="tracking-order-id">ORDER ${order.id}</div>
        <h1 class="tracking-heading">Track Your Order</h1>
        <div style="display:flex;gap:20px;margin-top:12px;flex-wrap:wrap;">
          <div>
            <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--slate-2);font-weight:600;margin-bottom:3px;">Tracking ID</div>
            <div style="font-size:14px;font-weight:600;color:var(--obsidian);font-family:monospace;">${order.trackingId}</div>
          </div>
          <div>
            <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--slate-2);font-weight:600;margin-bottom:3px;">Payment</div>
            <div style="font-size:14px;font-weight:600;color:var(--obsidian);text-transform:capitalize;">${(order.paymentMethod || 'card').toUpperCase()}</div>
          </div>
          <div>
            <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--slate-2);font-weight:600;margin-bottom:3px;">Order Date</div>
            <div style="font-size:14px;font-weight:600;color:var(--obsidian);">${new Date(order.date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</div>
          </div>
        </div>
      </div>

      <!-- Step progress -->
      <div class="tracking-steps">
        ${STEPS.map((step, i) => {
          const done   = i < currentStepIdx;
          const active = i === currentStepIdx;
          const pending = i > currentStepIdx;
          const cls    = done ? 'done' : active ? 'active' : 'pending';

          // Fake timestamps
          const baseTime = new Date(order.date).getTime();
          const stepTime = new Date(baseTime + i * 18 * 3600000);
          const timeStr  = done ? stepTime.toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}) :
                          active ? 'In progress' : 'Pending';

          return `
            <div class="tracking-step ${cls}">
              <div class="tracking-step-line"></div>
              <div class="tracking-step-icon">${done ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>` : step.icon}</div>
              <div class="tracking-step-body">
                <div class="tracking-step-label">${step.label}</div>
                <div class="tracking-step-time">${timeStr}${active ? ` — ${step.desc}` : ''}</div>
              </div>
            </div>`;
        }).join('')}
      </div>

      <!-- Estimated delivery -->
      ${order.status !== 'delivered' ? `
        <div class="tracking-est">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
          <div>
            <div class="tracking-est-label">Estimated Delivery</div>
            <div class="tracking-est-date">${estDate}</div>
          </div>
        </div>` : `
        <div class="tracking-est" style="background:var(--success-bg);border-color:#b8e0cb;">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          <div>
            <div class="tracking-est-label" style="color:var(--success);">Delivered</div>
            <div class="tracking-est-date">Your order was delivered successfully.</div>
          </div>
        </div>`}

      <!-- Ordered items -->
      ${order.items && order.items.length > 0 ? `
        <div style="margin-top:32px;padding-top:28px;border-top:1px solid var(--border);">
          <h3 style="font-size:14px;font-weight:600;color:var(--obsidian);margin-bottom:16px;text-transform:uppercase;letter-spacing:0.08em;">Items in This Order</h3>
          <div style="display:flex;flex-direction:column;gap:12px;">
            ${order.items.map(item => `
              <div style="display:flex;align-items:center;gap:12px;">
                <div style="width:50px;height:50px;border-radius:var(--r-md);overflow:hidden;background:var(--cream-2);flex-shrink:0;border:1px solid var(--border);">
                  <img src="${item.image||''}" alt="${item.name||''}" style="width:100%;height:100%;object-fit:cover;" onerror="this.src='https://picsum.photos/seed/fb${item.productId}/80/80'"/>
                </div>
                <div style="flex:1;">
                  <div style="font-size:14px;font-weight:500;color:var(--obsidian);">${item.name}</div>
                  <div style="font-size:12.5px;color:var(--slate-2);">Qty: ${item.quantity}</div>
                </div>
                <div style="font-size:14px;font-weight:600;color:var(--obsidian);">$${(item.price*item.quantity).toFixed(2)}</div>
              </div>`).join('')}
          </div>
          <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-size:15px;font-weight:700;color:var(--obsidian);">
            <span>Order Total</span><span>$${order.total.toFixed(2)}</span>
          </div>
        </div>` : ''}

      <!-- Actions -->
      <div style="display:flex;gap:10px;margin-top:28px;flex-wrap:wrap;">
        <a href="profile.html#orders" class="btn btn-outline btn-pill">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
          Back to Orders
        </a>
        <a href="contact.html" class="btn btn-ghost btn-pill">Need Help?</a>
      </div>
    </div>`;
}
</script>
</body>
</html>
