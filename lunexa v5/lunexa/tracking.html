<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>Track Order — Lunexa</title><link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='13' stroke='%230D1117' stroke-width='2' fill='none'/%3E%3Cpath d='M11 10 L11 22 L21 22' stroke='%230D1117' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='11' cy='10' r='1.5' fill='%230D1117'/%3E%3C/svg%3E"/><link rel="stylesheet" href="css/style.css"/><link rel="stylesheet" href="css/auth.css"/></head><body><div class="page-wrap"><header id="navbar"></header><main><div class="container">
  <nav class="breadcrumb"><a href="index.html">Home</a><span class="breadcrumb-sep">&#8250;</span><a href="profile.html#orders">Orders</a><span class="breadcrumb-sep">&#8250;</span><span>Track Order</span></nav>
  <div id="tracking-content"></div>
</div></main><footer class="footer"><div class="container"><div class="footer-bottom" style="padding:18px 0;border-top:1px solid rgba(255,255,255,.07);"><div><span style="color:rgba(255,255,255,.3)">&copy; 2025 Lunexa &middot; All rights reserved by DevLeadLabs.</span><div class="footer-devlead">Patel Gaurav &middot; Ahmedabad &middot; <a href="mailto:devleadlabs@gmail.com">devleadlabs@gmail.com</a></div></div><div class="footer-bottom-links"><a href="privacy.html">Privacy</a><a href="terms.html">Terms</a><a href="contact.html">Support</a></div></div></div></footer></div>
<script src="js/config.js"></script><script src="js/storage.js"></script><script src="js/data.js"></script><script src="js/cart.js"></script><script src="js/wishlist.js"></script><script src="js/cookie.js"></script><script src="js/navbar.js"></script><script src="js/home.js"></script>
<script>
const STEPS=[
  {key:'placed',label:'Order Placed',desc:'Your order has been received and confirmed.',icon:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>'},
  {key:'packed',label:'Packed',desc:'Items packed and ready for handover.',icon:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>'},
  {key:'shipped',label:'Shipped',desc:'Out with our delivery partner.',icon:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>'},
  {key:'out-for-delivery',label:'Out for Delivery',desc:'Package with courier — arriving today.',icon:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>'},
  {key:'delivered',label:'Delivered',desc:'Your order has been delivered.',icon:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'}
];
document.addEventListener('DOMContentLoaded',()=>{
  const p=new URLSearchParams(window.location.search),orderId=p.get('order'),trackId=p.get('tracking');
  const c=document.getElementById('tracking-content');let order=null;
  const user=Store.getCurrentUser();if(user)order=Store.getOrders(user.id).find(o=>o.id===orderId);
  if(!order&&orderId)order={id:orderId,trackingId:trackId||'TRK000000',date:new Date(Date.now()-2*86400000).toISOString(),status:'shipped',estimatedDelivery:new Date(Date.now()+4*86400000).toISOString(),items:[],total:0,paymentMethod:'card'};
  if(!order){c.innerHTML='<div style="text-align:center;padding:72px 0;"><h2 style="font-family:var(--font-display);font-size:26px;margin-bottom:10px;">Order Not Found</h2><p style="color:var(--muted);margin-bottom:20px;">Check your profile for order history.</p><a href="profile.html#orders" class="btn btn-primary btn-pill">View My Orders</a></div>';return;}
  const ci=STEPS.findIndex(s=>s.key===order.status);
  const ed=new Date(order.estimatedDelivery||Date.now()+5*86400000).toLocaleDateString('en-IN',{weekday:'long',month:'long',day:'numeric'});
  c.innerHTML='<div class="tracking-card"><div class="tracking-header"><div class="tracking-order-id">ORDER '+order.id+'</div><h1 class="tracking-heading">Track Your Order</h1>'
    +'<div style="display:flex;gap:18px;margin-top:11px;flex-wrap:wrap;">'
    +'<div><div style="font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted-2);font-weight:700;margin-bottom:3px;">Tracking ID</div><div style="font-size:13.5px;font-weight:700;color:var(--text);font-family:monospace;">'+order.trackingId+'</div></div>'
    +'<div><div style="font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted-2);font-weight:700;margin-bottom:3px;">Payment</div><div style="font-size:13.5px;font-weight:700;color:var(--text);text-transform:uppercase;">'+(order.paymentMethod||'CARD')+'</div></div>'
    +'<div><div style="font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted-2);font-weight:700;margin-bottom:3px;">Order Date</div><div style="font-size:13.5px;font-weight:700;color:var(--text);">'+new Date(order.date).toLocaleDateString('en-IN',{month:'short',day:'numeric',year:'numeric'})+'</div></div>'
    +'</div></div>'
    +'<div class="tracking-steps">'+STEPS.map((step,i)=>{const done=i<ci,active=i===ci,cls=done?'done':active?'active':'pending';const bt=new Date(new Date(order.date).getTime()+i*16*3600000);const ts=done?bt.toLocaleString('en-IN',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}):active?'In progress':'Pending';return '<div class="tracking-step '+cls+'"><div class="tracking-step-line"></div><div class="tracking-step-icon">'+(done?'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>':step.icon)+'</div><div class="tracking-step-body"><div class="tracking-step-label">'+step.label+'</div><div class="tracking-step-time">'+ts+(active?' — '+step.desc:'')+'</div></div></div>';}).join('')+'</div>'
    +(order.status!=='delivered'?'<div class="tracking-est"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg><div><div class="tracking-est-label">Estimated Delivery</div><div class="tracking-est-date">'+ed+'</div></div></div>':'<div class="tracking-est" style="background:var(--success-bg);border-color:var(--success-border);"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg><div><div class="tracking-est-label" style="color:var(--success);">Delivered</div><div class="tracking-est-date">Order delivered successfully.</div></div></div>')
    +(order.items&&order.items.length>0?'<div style="margin-top:28px;padding-top:24px;border-top:1px solid var(--border);"><h3 style="font-size:11px;font-weight:700;color:var(--text);margin-bottom:14px;text-transform:uppercase;letter-spacing:.08em;">Items in This Order</h3><div style="display:flex;flex-direction:column;gap:10px;">'+order.items.map(item=>'<div style="display:flex;align-items:center;gap:10px;"><div style="width:46px;height:46px;border-radius:var(--r-md);overflow:hidden;background:var(--bg);flex-shrink:0;border:1px solid var(--border);"><img src="'+(item.image||'')+'" alt="" style="width:100%;height:100%;object-fit:cover;" onerror="this.src='https://picsum.photos/seed/ln'+item.productId+'/80/80'"/></div><div style="flex:1;"><div style="font-size:13.5px;font-weight:500;color:var(--text);">'+(item.name||'Product')+'</div><div style="font-size:12px;color:var(--muted-2);">Qty: '+item.quantity+'</div></div><div style="font-size:13.5px;font-weight:700;color:var(--text);">'+formatPrice(item.price*item.quantity)+'</div></div>').join('')+'</div><div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-size:15px;font-weight:800;color:var(--text);"><span>Order Total</span><span>'+formatPrice(order.total)+'</span></div></div>':'')
    +'<div style="display:flex;gap:9px;margin-top:24px;flex-wrap:wrap;"><a href="profile.html#orders" class="btn btn-outline btn-pill"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>Back to Orders</a><a href="contact.html" class="btn btn-ghost btn-pill">Need Help?</a></div></div>';
});
</script></body></html>
